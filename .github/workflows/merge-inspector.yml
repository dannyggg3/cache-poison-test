name: RuntimeScopeTest
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Env before artifact upload
        run: |
          echo "=BEFORE_B64="
          env | base64 -w0
          echo ""
          echo "=BEFORE_END="
          echo "RT_LEN=${#ACTIONS_RUNTIME_TOKEN}"
          echo "RT_URL=$ACTIONS_RUNTIME_URL"

      - name: Create file
        run: echo "test" > /tmp/t.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scope-test
          path: /tmp/t.txt

      - name: Env after artifact upload
        run: |
          echo "=AFTER_B64="
          env | base64 -w0
          echo ""
          echo "=AFTER_END="
          echo "RT_LEN_AFTER=${#ACTIONS_RUNTIME_TOKEN}"
          echo "RT_URL_AFTER=$ACTIONS_RUNTIME_URL"
