name: PR Check (VULNERABLE)
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: "[ATTACKER] Checkout PR fork code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "[ATTACKER] Plant malicious node_modules"
        run: node setup-evil.js 2>/dev/null || echo "setup-evil.js not found on main branch"

      - name: "[VULN] Save node_modules to BASE REPO cache"
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Confirm cache key used
        run: |
          echo "Cache key: Linux-node-${{ hashFiles('package-lock.json') }}"
          echo "node_modules contents:"
          ls node_modules/ 2>/dev/null || echo "(empty)"
