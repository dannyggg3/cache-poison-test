name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Deep IMDS probe
        run: |
          echo "=== AZURE MANAGED IDENTITY CHECK ==="
          curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/info?api-version=2019-08-01" \
            -H "Metadata: true" && echo "" || echo "No managed identity info endpoint"

          echo ""
          echo "=== MANAGED IDENTITY TOKEN (management.azure.com) ==="
          curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2019-08-01&resource=https://management.azure.com/" \
            -H "Metadata: true" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print('access_token preview:', d.get('access_token','')[:30]+'...')
    print('token_type:', d.get('token_type'))
    print('expires_in:', d.get('expires_in'))
    print('resource:', d.get('resource'))
    print('client_id:', d.get('client_id','NOT_SET'))
except Exception as e:
    print('Error:', e)
    sys.stdin = open('/dev/stdin')
" 2>&1 || echo "No managed identity (HTTP error)"

          echo ""
          echo "=== MANAGED IDENTITY TOKEN (github API) ==="
          curl -sf --max-time 8 \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2019-08-01&resource=https://management.core.windows.net/" \
            -H "Metadata: true" | python3 -c "
import sys, json
d = json.load(sys.stdin)
tok = d.get('access_token','')
print('GOT TOKEN! preview:', tok[:40]+'...')
print('client_id:', d.get('client_id'))
" 2>&1 || echo "No managed identity for management"

          echo ""
          echo "=== ALL IMDS IDENTITY ENDPOINTS ==="
          for ep in "info" "oauth2/token?api-version=2019-08-01&resource=https://storage.azure.com/" "oauth2/token?api-version=2019-08-01&resource=https://vault.azure.net/"; do
            echo -n "identity/$ep: "
            curl -sf --max-time 5 "http://169.254.169.254/metadata/identity/$ep" -H "Metadata: true" -o /dev/null -w "%{http_code}\n"
          done

          echo ""
          echo "=== IMDS COMPUTE userData ==="
          curl -sf --max-time 5 "http://169.254.169.254/metadata/instance/compute/userData?api-version=2021-02-01&format=text" -H "Metadata: true" && echo "" || echo "no userData"

          echo ""
          echo "=== IMDS IMAGE SUBSCRIPTION ==="
          curl -sf --max-time 5 "http://169.254.169.254/metadata/instance/compute/storageProfile/imageReference?api-version=2021-02-01" -H "Metadata: true" | python3 -m json.tool
