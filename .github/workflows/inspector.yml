name: Inspector
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Internal URLs and runtime token
        run: |
          echo "=== INTERNAL URLS ==="
          echo "RUNTIME_URL: $ACTIONS_RUNTIME_URL"
          echo "CACHE_URL: $ACTIONS_CACHE_URL"
          echo "RESULTS_URL: ${ACTIONS_RESULTS_URL:-NOT_SET}"
          echo "RUN_ID: $GITHUB_RUN_ID"
          echo ""
          echo "=== RUNTIME TOKEN DECODE ==="
          echo $ACTIONS_RUNTIME_TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k,':',v) for k,v in d.items()]" 2>/dev/null || echo "decode failed"
          echo ""
          echo "=== CACHE API PROBE ==="
          curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
            "${ACTIONS_CACHE_URL}_apis/artifactcache/cache?keys=Linux-node-&version=1"
          echo ""
          curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
            "${ACTIONS_CACHE_URL}_apis/artifactcache/caches?top=5"

      - name: OIDC token claims
        run: |
          echo "=== OIDC CLAIMS ==="
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          echo $T | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k,':',v) for k,v in d.items()]"

      - name: Cloud IMDS probe
        run: |
          echo "=== IMDS PROBE ==="
          curl -s --max-time 3 http://169.254.169.254/metadata/instance -H "Metadata: true" && echo "(azure imds ok)" || echo "azure imds: blocked"
          curl -s --max-time 3 http://169.254.169.254/latest/meta-data/ && echo "(aws imds ok)" || echo "aws imds: blocked"
